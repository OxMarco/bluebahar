x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  app:
    build:
      context: .
      target: runtime
      args:
        # Optional: stamp the image with the deploy's git SHA so events tie to a
        # release and uploaded source maps resolve. Defaults to empty ("no
        # release") when unset, which is fine. To use it:
        #   export SENTRY_RELEASE="$(git rev-parse HEAD)" && docker compose ... build
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      # AI-vision cross-check of extracted geometry against the notice's chart
      # pages; mismatches go to the review queue. Set to "false" to disable.
      VISION_VERIFY: ${VISION_VERIFY:-true}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY required}
      NOTICE_SCRAPE_BATCH_SIZE: ${NOTICE_SCRAPE_BATCH_SIZE:?NOTICE_SCRAPE_BATCH_SIZE required}
      # Route Transport Malta scraper egress through the WARP sidecar — their
      # Cloudflare WAF 403s our datacenter IP. socks5h:// (remote DNS) is
      # required; socks5:// leaks to IPv6 and fails. Override in .env to point
      # at a residential proxy instead.
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-socks5h://warp:1080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      warp:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3000/v1/health/live'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0
    logging: *default-logging
    networks:
      - backend
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.app.rule=Host(`${DOMAIN:?DOMAIN required}`)'
      - 'traefik.http.routers.app.entrypoints=websecure'
      - 'traefik.http.routers.app.tls=true'
      - 'traefik.http.routers.app.tls.certresolver=letsencrypt'
      - 'traefik.http.services.app.loadbalancer.server.port=3000'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging
    networks:
      - backend

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    networks:
      - backend

  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    command:
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--providers.docker.network=backend'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
      - '--entrypoints.websecure.address=:443'
      - '--entrypoints.websecure.http.tls=true'
      - '--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL required}'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--accesslog=true'
      - '--log.level=INFO'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    mem_limit: 128m
    cpus: 0.5
    logging: *default-logging
    networks:
      - backend

  # Cloudflare WARP in proxy mode — exposes a SOCKS5 proxy on :1080 whose
  # egress is a Cloudflare WARP IP. Used only by the app's Transport Malta
  # scraper (SCRAPER_PROXY_URL) to get past their datacenter-IP WAF block.
  # Not published to the host; reachable only on the backend network.
  warp:
    image: caomingjun/warp
    restart: unless-stopped
    expose:
      - '1080'
    cap_add:
      - NET_ADMIN
      - MKNOD
      - AUDIT_WRITE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - warp_data:/var/lib/cloudflare-warp
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fs https://www.cloudflare.com/cdn-cgi/trace | grep -q "warp=on"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 128m
    cpus: 0.5
    logging: *default-logging
    networks:
      - backend

volumes:
  pgdata:
  traefik_letsencrypt:
  warp_data:

networks:
  backend:
    driver: bridge
