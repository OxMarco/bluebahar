services:
  app:
    build:
      context: .
      target: builder
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Mount source code for hot-reloading
      - ./src:/app/src:delegated
      - ./views:/app/views:delegated
      - ./public:/app/public:delegated
      - ./nest-cli.json:/app/nest-cli.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./tsconfig.build.json:/app/tsconfig.build.json:ro
      # GeoJSON datasets — bind-mounted so edits take effect without rebuild.
      - ./data:/app/data:delegated
    command: npm run start:dev
    env_file:
      - .env
    environment:
      # Override DB_HOST to use docker service name
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Community-map import runs on boot. Use the self-authored briefs locally
      # so it's instant and needs no OpenAI billing; flip to true to exercise the
      # AI descriptions. (.env can override.)
      COMMUNITY_MAP_IMPORT_ENABLED: 'true'
      COMMUNITY_MAP_DESCRIBE_WITH_AI: 'false'
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: bluebahardb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.2-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'

volumes:
  pgdata:
